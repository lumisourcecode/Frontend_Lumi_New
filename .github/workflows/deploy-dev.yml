name: Deploy Frontend Dev to EC2

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH key
        env:
          EC2_SSH_KEY_B64: ${{ secrets.EC2_SSH_KEY_B64 }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          if [ -n "$EC2_SSH_KEY_B64" ]; then
            printf '%s' "$EC2_SSH_KEY_B64" | base64 -d | tr -d '\r' > ~/.ssh/id_rsa
          elif [ -n "$EC2_SSH_KEY" ]; then
            printf '%s' "$EC2_SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          else
            echo "Missing EC2_SSH_KEY_B64 or EC2_SSH_KEY secret" >&2
            exit 1
          fi
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null

      - name: Deploy frontend on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          APP_DIR: ${{ secrets.EC2_APP_DIR }}
          APP_NAME: lumi-ride-dev
          APP_PORT: 3000
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new -o ServerAliveInterval=30 -o ServerAliveCountMax=20 "${EC2_USER}@${EC2_HOST}" '
            set -e
            mkdir -p "'"${APP_DIR}"'"
            cd "'"${APP_DIR}"'"
            FREE_KB="$(df -Pk . | awk "NR==2 {print \$4}")"
            MIN_FREE_KB=$((2048 * 1024))
            if [ "${FREE_KB}" -lt "${MIN_FREE_KB}" ]; then
              echo "Low disk (${FREE_KB} KB free). Running cleanup before rsync."
              rm -rf .next || true
              npm cache clean --force >/dev/null 2>&1 || true
              rm -rf ~/.npm/_cacache ~/.cache >/dev/null 2>&1 || true
              pm2 flush >/dev/null 2>&1 || true
              rm -f ~/.pm2/logs/*.log >/dev/null 2>&1 || true
              docker image prune -af >/dev/null 2>&1 || sudo docker image prune -af >/dev/null 2>&1 || true
              sudo journalctl --vacuum-time=3d >/dev/null 2>&1 || true
              sudo apt-get clean >/dev/null 2>&1 || true
              sudo rm -rf /var/lib/apt/lists/* >/dev/null 2>&1 || true
            else
              echo "Disk healthy (${FREE_KB} KB free). Skipping heavy cleanup."
            fi
            df -h
          '
          rsync -az --delete --exclude '.git' --exclude 'node_modules' -e "ssh -o StrictHostKeyChecking=accept-new -o ServerAliveInterval=30 -o ServerAliveCountMax=20" ./ "${EC2_USER}@${EC2_HOST}:${APP_DIR}/"
          ssh -o StrictHostKeyChecking=accept-new -o ServerAliveInterval=30 -o ServerAliveCountMax=20 "${EC2_USER}@${EC2_HOST}" '
            set -e
            export DEBIAN_FRONTEND=noninteractive
            command -v node >/dev/null 2>&1 || (curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash - && sudo apt-get install -y nodejs)
            command -v pm2 >/dev/null 2>&1 || sudo npm i -g pm2
            command -v nginx >/dev/null 2>&1 || (sudo apt-get update -qq && sudo apt-get install -y nginx)

            cd "'"${APP_DIR}"'"
            export NEXT_PUBLIC_API_BASE_URL=https://new.lumiride.com/api
            export NEXT_PUBLIC_GOOGLE_CLIENT_ID="'"${NEXT_PUBLIC_GOOGLE_CLIENT_ID}"'"
            export NEXT_PUBLIC_GOOGLE_MAPS_API_KEY="'"${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}"'"
            export APP_NAME="'"${APP_NAME}"'" APP_PORT="'"${APP_PORT}"'"
            chmod +x scripts/deploy-ec2.sh
            bash scripts/deploy-ec2.sh dev

            # SSL: deploy-ec2.sh writes nginx (/_next/static, /api, /). Obtain cert on first deploy.
            if ! command -v certbot >/dev/null 2>&1; then
              sudo apt-get update -qq && sudo apt-get install -y certbot python3-certbot-nginx
            fi
            if [ ! -f /etc/letsencrypt/live/new.lumiride.com/fullchain.pem ]; then
              sudo certbot --nginx -d new.lumiride.com --non-interactive --agree-tos -m admin@lumiride.com || true
              # Certbot may alter nginx; re-apply our site (HTTPS + /_next/static + /api) without a full rebuild
              NGINX_ONLY=1 bash scripts/deploy-ec2.sh dev
            fi
          '
