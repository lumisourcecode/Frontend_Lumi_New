name: Deploy frontend (dev) to EC2

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-frontend-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Frontend -> EC2
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH key
        env:
          EC2_SSH_KEY_B64: ${{ secrets.EC2_SSH_KEY_B64 }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -e
          mkdir -p ~/.ssh
          if [ -n "${EC2_SSH_KEY_B64}" ]; then
            printf '%s' "${EC2_SSH_KEY_B64}" | base64 -d | tr -d '\r' > ~/.ssh/id_rsa
          elif [ -n "${EC2_SSH_KEY}" ]; then
            printf '%s' "${EC2_SSH_KEY}" | tr -d '\r' > ~/.ssh/id_rsa
          else
            echo "Missing EC2_SSH_KEY_B64 or EC2_SSH_KEY" >&2
            exit 1
          fi
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null

      - name: Deploy on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
          APP_NAME: lumi-ride-dev
          APP_PORT: "3000"
          LUMI_PUBLIC_HOST: ${{ vars.LUMI_PUBLIC_HOST }}
          LUMI_CERTBOT_EMAIL: ${{ vars.LUMI_CERTBOT_EMAIL }}
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
        run: |
          set -e
          test -n "${EC2_HOST}" && test -n "${EC2_USER}" && test -n "${EC2_APP_DIR}" || { echo "Set EC2_HOST, EC2_USER, EC2_APP_DIR secrets"; exit 1; }
          SITE_HOST="${LUMI_PUBLIC_HOST:-new.lumiride.com}"
          CERT_EMAIL="${LUMI_CERTBOT_EMAIL:-admin@lumiride.com}"

          ssh -o StrictHostKeyChecking=accept-new "${EC2_USER}@${EC2_HOST}" "mkdir -p '${EC2_APP_DIR}'"
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.next' \
            -e "ssh -o StrictHostKeyChecking=accept-new" \
            ./ "${EC2_USER}@${EC2_HOST}:${EC2_APP_DIR}/"

          ssh -o StrictHostKeyChecking=accept-new -o ServerAliveInterval=30 -o ServerAliveCountMax=20 "${EC2_USER}@${EC2_HOST}" "
            set -e
            export APP_NAME='${APP_NAME}' APP_PORT='${APP_PORT}'
            export LUMI_DOMAIN='${SITE_HOST}'
            export LUMI_CERTBOT_EMAIL='${CERT_EMAIL}'
            export NEXT_PUBLIC_API_BASE_URL='${NEXT_PUBLIC_API_BASE_URL:-https://${SITE_HOST}/api}'
            export NEXT_PUBLIC_GOOGLE_CLIENT_ID='${NEXT_PUBLIC_GOOGLE_CLIENT_ID}'
            export NEXT_PUBLIC_GOOGLE_MAPS_API_KEY='${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}'
            cd '${EC2_APP_DIR}'
            chmod +x scripts/deploy-ec2.sh
            bash scripts/deploy-ec2.sh dev
            # Force idempotent HTTPS/nginx reconciliation so no manual server commands are needed.
            export LUMI_DOMAIN='${SITE_HOST}'
            export APP_PORT='${APP_PORT}'
            NGINX_ONLY=1 bash scripts/deploy-ec2.sh dev
            APT_WAIT='-o Acquire::Lock::Timeout=180 -o DPkg::Lock::Timeout=180'
            wait_for_apt_lock() {
              local i=0
              while sudo fuser /var/lib/apt/lists/lock >/dev/null 2>&1 \
                || sudo fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 \
                || sudo fuser /var/lib/dpkg/lock >/dev/null 2>&1; do
                i=\$((i + 1))
                [ \"\$i\" -gt 60 ] && { echo 'apt lock timeout' >&2; exit 1; }
                echo 'Waiting for apt lock...'
                sleep 5
              done
            }
            if ! command -v certbot >/dev/null 2>&1; then
              wait_for_apt_lock
              sudo apt-get \$APT_WAIT update -qq
              sudo apt-get \$APT_WAIT install -y certbot python3-certbot-nginx
            fi
            sudo certbot --nginx -d '${SITE_HOST}' --non-interactive --agree-tos -m '${CERT_EMAIL}' --redirect || true
            sudo nginx -t && sudo systemctl reload nginx
            sudo ss -ltnp | rg ':80|:443' || true
            # Local app and local nginx checks on EC2
            curl -fsS 'http://127.0.0.1:${APP_PORT}/' >/dev/null
            curl -kI 'https://127.0.0.1/' >/dev/null || true
          "

      - name: Public endpoint check
        env:
          LUMI_PUBLIC_HOST: ${{ vars.LUMI_PUBLIC_HOST }}
        run: |
          set -e
          H="${LUMI_PUBLIC_HOST:-new.lumiride.com}"
          echo "Checking https://${H}/login"
          curl -kI --retry 5 --retry-delay 3 --max-time 20 "https://${H}/login"

      - name: Summary
        if: success()
        env:
          LUMI_PUBLIC_HOST: ${{ vars.LUMI_PUBLIC_HOST }}
        run: |
          H="${LUMI_PUBLIC_HOST:-new.lumiride.com}"
          echo "✅ Frontend deployed automatically on push to dev"
          echo "URL: https://${H}"
